<div class="worldmap-screen">
  <div class="worldmap-header">
    <span class="title">🗺️  WORLD MAP — WESTEROS</span>
    <span class="hint">[M / Esc] Close</span>
  </div>

  <div class="worldmap-wrap">
    <div class="worldmap-grid" *ngIf="mapRows().length">
      <div class="map-row" *ngFor="let row of mapRows(); let y = index; trackBy: trackByIndex">
        <span
          class="map-cell"
          *ngFor="let cell of row; let x = index; trackBy: trackByIndex"
          [ngStyle]="cellStyle(cell, x, y)"
        >{{ cellChar(cell, x, y) }}</span>
      </div>
    </div>
  </div>

  <div class="worldmap-legend">
    <span class="leg-item"><span style="color:#4488ff">≈</span> River</span>
    <span class="leg-item"><span style="color:#aa8844">═</span> Bridge</span>
    <span class="leg-item"><span style="color:#2255cc">~</span> Ocean</span>
    <span class="leg-item"><span style="color:#44aa44">.</span> Plains</span>
    <span class="leg-item"><span style="color:#226622">T</span> Forest</span>
    <span class="leg-item"><span style="color:#888888">^</span> Mountain</span>
    <span class="leg-item"><span style="color:#aaaaaa">▓</span> The Wall</span>
    <span class="leg-item"><span style="color:#557755">%</span> Swamp</span>
    <span class="leg-item"><span style="color:#ccddee">*</span> Snow</span>
    <span class="leg-item"><span style="color:#ffcc00">#</span> Town</span>
    <span class="leg-item"><span style="color:#ff9900">Ω</span> City</span>
    <span class="leg-item"><span style="color:#aaccff">◆</span> Castle</span>
    <span class="leg-item"><span style="color:#ffffff">&#64;</span> You</span>
  </div>
</div>
