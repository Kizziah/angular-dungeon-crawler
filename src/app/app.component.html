<div class="app-shell">
  <div class="title-bar">
    <span class="title-text">{{ title }}</span>
    <span class="location">[ {{ getRouteLabel() }} ]</span>
    @if (party().length > 0) {
      <span class="party-info">Party: {{ party().length }} | Gold: {{ guild().gold }}gp</span>
    }
    @if (auth.isLoggedIn()) {
      <span class="auth-info">
        {{ auth.currentUser()?.username }}
        @if (auth.isPremium()) {
          <span class="premium-badge">★ PREMIUM</span>
        }
      </span>
    }
  </div>
  <div class="app-content">
    <router-outlet />
  </div>
  <div class="status-bar">
    <span class="dos-dim">v1.0.0</span>
    <span class="dos-dim">WASD/Arrows: Move | ESC: Menu</span>
    <span class="dos-dim">© 2026</span>
  </div>
</div>

@if (auth.isPremium()) {
  <app-chat-overlay />
}
