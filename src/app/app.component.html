<div class="app-shell">
  <div class="title-bar">
    <span class="title-text">{{ title }}</span>
    <span class="location">[ {{ getRouteLabel() }} ]</span>
    <span class="party-info" *ngIf="party().length > 0">
      Party: {{ party().length }} | Gold: {{ guild().gold }}gp
    </span>
  </div>
  <div class="app-content">
    <router-outlet />
  </div>
  <div class="status-bar">
    <span class="dos-dim">v1.0.0</span>
    <span class="dos-dim">WASD/Arrows: Move | ESC: Menu</span>
    <span class="dos-dim">© 2026</span>
  </div>
</div>
